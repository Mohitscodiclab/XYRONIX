<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>XYRONIX — Infinite Canvas</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
  <style>
/* =============================================
   XYRONIX — Complete Stylesheet
   ============================================= */

/* ── CSS Variables ── */
:root {
  --bg:            #f0ece3;
  --canvas-bg:     #faf8f4;
  --toolbar-bg:    rgba(255,255,255,0.92);
  --panel-bg:      rgba(255,255,255,0.92);
  --border:        rgba(0,0,0,0.1);
  --shadow:        0 2px 12px rgba(0,0,0,0.1);
  --shadow-lg:     0 8px 32px rgba(0,0,0,0.15);
  --text:          #1a1a2e;
  --text-muted:    #6b7280;
  --accent:        #5b6cf9;
  --accent-hover:  #4558f5;
  --danger:        #e63946;
  --danger-hover:  #c02535;
  --tool-active:   #5b6cf9;
  --tool-hover:    rgba(91,108,249,0.1);
  --handle-fill:   #ffffff;
  --handle-stroke: #5b6cf9;
  --radius:        10px;
  --radius-sm:     6px;
  --toolbar-h:     56px;
  --panel-w:       200px;
  --statusbar-h:   28px;
  --font-ui:       'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono:     'Cascadia Code', 'Consolas', monospace;
  --transition:    0.18s ease;
}

[data-theme="dark"] {
  --bg:            #0f1117;
  --canvas-bg:     #13151f;
  --toolbar-bg:    rgba(22,25,38,0.96);
  --panel-bg:      rgba(22,25,38,0.96);
  --border:        rgba(255,255,255,0.08);
  --shadow:        0 2px 12px rgba(0,0,0,0.4);
  --shadow-lg:     0 8px 32px rgba(0,0,0,0.5);
  --text:          #e8eaf6;
  --text-muted:    #9095a8;
  --tool-hover:    rgba(91,108,249,0.15);
  --handle-fill:   #1e2030;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  display: grid;
  grid-template-rows: var(--toolbar-h) 1fr var(--statusbar-h);
  grid-template-columns: var(--panel-w) 1fr;
  grid-template-areas:
    "toolbar toolbar"
    "panel   canvas"
    "panel   status";
  transition: background var(--transition), color var(--transition);
}

/* ── Scrollbar Styling ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ══════════════════════════════════
   TOP TOOLBAR
══════════════════════════════════ */
#toolbar {
  grid-area: toolbar;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--shadow);
  z-index: 100;
  overflow-x: auto;
  overflow-y: hidden;
}

.toolbar-section {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.toolbar-section + .toolbar-section::before {
  content: '';
  display: block;
  width: 1px;
  height: 28px;
  background: var(--border);
  margin: 0 4px;
}

.brand .logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--accent);
  white-space: nowrap;
  font-family: Georgia, 'Times New Roman', serif;
}

/* Tool Buttons */
.tool-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 5px 8px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  min-width: 44px;
  font-family: var(--font-ui);
}

.tool-btn svg { width: 18px; height: 18px; fill: currentColor; stroke: none; flex-shrink: 0; pointer-events: none; }
.tool-btn span { font-size: 9px; font-weight: 500; text-transform: uppercase; pointer-events: none; }
.tool-btn:hover { background: var(--tool-hover); color: var(--accent); }
.tool-btn.active { background: var(--tool-hover); color: var(--accent); border-color: rgba(91,108,249,0.3); }

/* Icon Buttons */
.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  padding: 0;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
}

.icon-btn svg { width: 18px; height: 18px; fill: currentColor; stroke: none; pointer-events: none; }
.icon-btn:hover:not(:disabled) { background: var(--tool-hover); color: var(--accent); border-color: rgba(91,108,249,0.2); }
.icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.icon-btn.danger:hover { background: rgba(230,57,70,0.1); color: var(--danger); border-color: rgba(230,57,70,0.2); }
.icon-btn.sm { width: 28px; height: 28px; font-size: 14px; }

/* Text Buttons */
.text-btn {
  height: 32px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-ui);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.text-btn:hover { background: var(--tool-hover); color: var(--accent); border-color: rgba(91,108,249,0.3); }
.text-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.text-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
.text-btn.danger:hover { background: rgba(230,57,70,0.1); color: var(--danger); border-color: rgba(230,57,70,0.3); }

.btn-group { display: flex; align-items: center; gap: 2px; }

/* Social Links */
.links-section { margin-left: auto; gap: 8px; display: flex; }
.links-section .icon-btn { width: 32px; height: 32px; color: var(--text); opacity: 0.7; }
.links-section .icon-btn:hover { opacity: 1; color: var(--accent); background: transparent; border-color: transparent; transform: translateY(-2px); }

/* Mobile Panel Toggle */
.mobile-toggle { display: none; }

/* ══════════════════════════════════
   LEFT PROPERTIES PANEL
══════════════════════════════════ */
#props-panel {
  grid-area: panel;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow-y: auto;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 50;
}

.panel-section { padding: 8px 4px; border-bottom: 1px solid var(--border); }
.panel-section:last-child { border-bottom: none; }
.panel-label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }

/* Color Swatches */
.color-swatches { display: flex; flex-wrap: wrap; gap: 5px; }
.swatch {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer;
  transition: transform var(--transition), border-color var(--transition); display: flex;
  align-items: center; justify-content: center; font-size: 10px; color: var(--text-muted);
  flex-shrink: 0; outline: 2px solid transparent;
}
.swatch:hover { transform: scale(1.15); }
.swatch.active { outline: 2px solid var(--accent); outline-offset: 2px; }

.swatch.custom { background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); position: relative; overflow: hidden; }
.swatch.custom input[type="color"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; padding: 0; }
.swatch.custom span { color: white; font-weight: bold; font-size: 14px; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

/* Sliders */
.slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
.slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: transform var(--transition); }
.slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

/* Segmented Control */
.seg-control { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.seg-btn { flex: 1; padding: 5px 0; border: none; background: transparent; color: var(--text-muted); font-size: 10px; font-weight: 500; cursor: pointer; transition: all var(--transition); }
.seg-btn:not(:last-child) { border-right: 1px solid var(--border); }
.seg-btn:hover { background: var(--tool-hover); color: var(--accent); }
.seg-btn.active { background: var(--accent); color: #fff; }

/* Layer buttons */
.btn-group-v { display: flex; flex-direction: column; gap: 4px; }
.btn-group-v .icon-btn { width: 100%; height: 26px; justify-content: flex-start; padding: 0 8px; font-size: 11px; gap: 4px; border: 1px solid var(--border); }

/* ══════════════════════════════════
   CANVAS AREA
══════════════════════════════════ */
#canvas-wrapper { grid-area: canvas; position: relative; overflow: hidden; background: var(--canvas-bg); }
#main-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
#main-canvas.cursor-select  { cursor: default; }
#main-canvas.cursor-move    { cursor: move; }
#main-canvas.cursor-grab    { cursor: grab; }
#main-canvas.cursor-grabbing { cursor: grabbing; }
#main-canvas.cursor-text    { cursor: text; }
#main-canvas.cursor-bucket  { cursor: crosshair; }
#main-canvas.cursor-eraser  { cursor: cell; }
#main-canvas.cursor-nw-resize { cursor: nw-resize; }
#main-canvas.cursor-ne-resize { cursor: ne-resize; }
#main-canvas.cursor-se-resize { cursor: se-resize; }
#main-canvas.cursor-sw-resize { cursor: sw-resize; }
#main-canvas.cursor-n-resize  { cursor: n-resize; }
#main-canvas.cursor-s-resize  { cursor: s-resize; }
#main-canvas.cursor-e-resize  { cursor: e-resize; }
#main-canvas.cursor-w-resize  { cursor: w-resize; }

#text-cursor { position: absolute; z-index: 200; pointer-events: none; }
#text-input { pointer-events: all; border: 2px dashed var(--accent); border-radius: 2px; background: transparent; color: var(--text); font-family: var(--font-ui); font-size: 20px; line-height: 1.4; padding: 2px 4px; resize: none; outline: none; min-width: 100px; overflow: hidden; white-space: pre; }

/* ══════════════════════════════════
   ZOOM & STATUS
══════════════════════════════════ */
#zoom-controls { position: fixed; bottom: calc(var(--statusbar-h) + 12px); right: 16px; display: flex; align-items: center; background: var(--panel-bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); z-index: 100; backdrop-filter: blur(12px); }
#zoom-controls .icon-btn { border-radius: 0; border: none; width: 32px; height: 32px; font-size: 16px; font-weight: 400; }
.zoom-label { padding: 0 10px; font-size: 11px; font-weight: 600; color: var(--text-muted); cursor: pointer; background: transparent; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); height: 32px; min-width: 56px; display: flex; align-items: center; justify-content: center; }

#status-bar { grid-area: status; display: flex; align-items: center; gap: 16px; padding: 0 12px; background: var(--panel-bg); border-top: 1px solid var(--border); font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); z-index: 50; }
#status-hint { margin-left: auto; opacity: 0.6; }

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.15s ease; }
#modal-overlay.hidden { display: none; }
#modal { background: var(--toolbar-bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 24px; min-width: 300px; max-width: 400px; animation: slideUp 0.2s ease; }
#modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
#modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

@media (max-width: 768px) {
  :root { --panel-w: 0px; }
  body { grid-template-areas: "toolbar toolbar" "canvas canvas" "status status"; }
  
  /* Mobile specific toolbar layout */
  .mobile-toggle { display: flex; }
  .links-section { display: none; }
  .tool-btn span { display: none; }
  .tool-btn { min-width: 36px; padding: 5px; }
  .brand .logo { font-size: 13px; }
  #status-hint { display: none; }

  /* Mobile slide-out panel */
  #props-panel { 
    position: absolute;
    left: -220px; 
    top: var(--toolbar-h);
    bottom: var(--statusbar-h);
    width: 200px;
    z-index: 200;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-lg);
  }
  #props-panel.open {
    left: 0;
  }
}

.hidden { display: none !important; }
::selection { background: rgba(91,108,249,0.2); }
  </style>
</head>

<script>
/* =====================================================
   XYRONIX — Canvas Drawing Application
   Fully offline, no dependencies, pure vanilla JS
   ===================================================== */
'use strict';

// ══════════════════════════════════════════════════════
// 1. ID / SEED UTILITIES
// ══════════════════════════════════════════════════════

let _idCounter = Date.now();
const genId = () => `el_${(_idCounter++).toString(36)}`;

function SeededRandom(seed) { this.s = seed >>> 0; }
SeededRandom.prototype.next = function () {
  this.s |= 0;
  this.s = this.s + 0x6d2b79f5 | 0;
  let t = Math.imul(this.s ^ this.s >>> 15, 1 | this.s);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
};
SeededRandom.prototype.between = function (a, b) {
  return a + this.next() * (b - a);
};

// ══════════════════════════════════════════════════════
// 2. APPLICATION STATE
// ══════════════════════════════════════════════════════

const STATE = {
  elements: [],
  tool: 'select',
  isDrawing:   false,
  currentEl:   null,
  mouseWorld:  { x: 0, y: 0 },
  drawStart:   null,
  selectedIds:    new Set(),
  selectionBox:   null,
  isMoving:       false,
  moveStart:      null,
  moveOrigins:    null,
  isResizing:     false,
  resizeHandle:   null,
  resizeStart:    null,
  isPanning:   false,
  panStart:    null,
  spaceDown:   false,
  camera: { x: 0, y: 0, zoom: 1 },
  strokeColor:  '#1a1a2e',
  fillColor:    'transparent',
  strokeWidth:  2,
  opacity:      1.0,
  roughness:    1,
  fontSize:     20,
  darkMode:     false,
  gridEnabled:  false,
  gridSize:     20,
  editingId:    null,
  history:      [],
  historyIndex: -1,
  MAX_HISTORY:  80,
};

// ══════════════════════════════════════════════════════
// 3. CANVAS SETUP
// ══════════════════════════════════════════════════════

let canvas, ctx;
function initCanvas() {
  canvas = document.getElementById('main-canvas');
  ctx    = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}
function resizeCanvas() {
  const wrapper = document.getElementById('canvas-wrapper');
  const dpr = window.devicePixelRatio || 1;
  const W = wrapper.clientWidth;
  const H = wrapper.clientHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scheduleRender();
}

// ══════════════════════════════════════════════════════
// 4. COORDINATE UTILITIES
// ══════════════════════════════════════════════════════

function screenToWorld(sx, sy) {
  const { x: px, y: py, zoom } = STATE.camera;
  return { x: (sx - px) / zoom, y: (sy - py) / zoom };
}
function worldToScreen(wx, wy) {
  const { x: px, y: py, zoom } = STATE.camera;
  return { x: wx * zoom + px, y: wy * zoom + py };
}
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

// ══════════════════════════════════════════════════════
// 5. ROUGH DRAWING HELPERS
// ══════════════════════════════════════════════════════

function buildRoughRect(x, y, w, h, seed, roughness) {
  const rng = new SeededRandom(seed);
  const r = roughness * 2;
  const cmds = [];
  function addSide(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const px = -dy / len, py = dx / len;
    const cp = rng.between(-r, r) * 0.4;
    const mx = (x1 + x2) / 2 + px * cp + rng.between(-r, r) * 0.2;
    const my = (y1 + y2) / 2 + py * cp + rng.between(-r, r) * 0.2;
    const ex = x2 + rng.between(-r, r) * 0.3;
    const ey = y2 + rng.between(-r, r) * 0.3;
    cmds.push({ t: 'M', x: x1 + rng.between(-r, r) * 0.3, y: y1 + rng.between(-r, r) * 0.3 });
    cmds.push({ t: 'Q', cx: mx, cy: my, x: ex, y: ey });
  }
  for (let pass = 0; pass < 2; pass++) {
    const ox = rng.between(-r, r) * 0.15 * (pass + 1);
    const oy = rng.between(-r, r) * 0.15 * (pass + 1);
    addSide(x + ox, y + oy, x + w + ox, y + oy);         
    addSide(x + w + ox, y + oy, x + w + ox, y + h + oy);  
    addSide(x + w + ox, y + h + oy, x + ox, y + h + oy);  
    addSide(x + ox, y + h + oy, x + ox, y + oy);         
  }
  return cmds;
}

function buildRoughEllipse(cx, cy, rx, ry, seed, roughness) {
  const rng = new SeededRandom(seed);
  const r = roughness;
  const steps = 24 + Math.floor(rng.next() * 8);
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const angle = (i / steps) * Math.PI * 2;
    pts.push({ x: cx + (rx + rng.between(-r, r)) * Math.cos(angle), y: cy + (ry + rng.between(-r, r)) * Math.sin(angle) });
  }
  const pts2 = [];
  for (let i = 0; i <= steps; i++) {
    const angle = (i / steps) * Math.PI * 2 + rng.between(-0.05, 0.05);
    pts2.push({ x: cx + (rx + rng.between(-r * 0.5, r * 0.5)) * Math.cos(angle), y: cy + (ry + rng.between(-r * 0.5, r * 0.5)) * Math.sin(angle) });
  }
  return { pts, pts2 };
}

function buildRoughLine(x1, y1, x2, y2, seed, roughness) {
  const rng = new SeededRandom(seed);
  const r = roughness * 1.5;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  const px = -dy / len, py = dx / len;
  const cp1 = rng.between(-r, r), cp2 = rng.between(-r, r);
  return [
    { t: 'M', x: x1 + rng.between(-r*0.3,r*0.3), y: y1 + rng.between(-r*0.3,r*0.3) },
    { t: 'Q', cx: (x1+x2)/2 + px*cp1, cy: (y1+y2)/2 + py*cp1, x: x2 + rng.between(-r*0.3,r*0.3), y: y2 + rng.between(-r*0.3,r*0.3) },
    { t: 'M', x: x1 + rng.between(-r*0.2,r*0.2), y: y1 + rng.between(-r*0.2,r*0.2) },
    { t: 'Q', cx: (x1+x2)/2 + px*cp2*0.5, cy: (y1+y2)/2 + py*cp2*0.5, x: x2 + rng.between(-r*0.2,r*0.2), y: y2 + rng.between(-r*0.2,r*0.2) },
  ];
}

function replayCmds(ctx, cmds) {
  ctx.beginPath();
  for (const c of cmds) {
    if (c.t === 'M') ctx.moveTo(c.x, c.y);
    else if (c.t === 'L') ctx.lineTo(c.x, c.y);
    else if (c.t === 'Q') ctx.quadraticCurveTo(c.cx, c.cy, c.x, c.y);
  }
}
function replayPts(ctx, pts) {
  if (!pts.length) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
}

// ══════════════════════════════════════════════════════
// 6. ELEMENT FACTORIES
// ══════════════════════════════════════════════════════

function makeBase(type, extra = {}) {
  return {
    id:          genId(),
    type,
    seed:        Math.floor(Math.random() * 0xFFFFFF),
    strokeColor: STATE.strokeColor,
    fillColor:   STATE.fillColor,
    strokeWidth: STATE.strokeWidth,
    opacity:     STATE.opacity,
    roughness:   STATE.roughness,
    _rough:      null,
    ...extra,
  };
}
function makeRect(x, y, w, h) { return makeBase('rect', { x, y, width: w, height: h }); }
function makeCircle(x, y, w, h) { return makeBase('circle', { x, y, width: w, height: h }); }
function makeLine(x1, y1, x2, y2) { return makeBase('line', { x1, y1, x2, y2 }); }
function makeArrow(x1, y1, x2, y2) { return makeBase('arrow', { x1, y1, x2, y2 }); }
function makePencil(pts) { return makeBase('pencil', { points: pts }); }
function makeText(x, y, text = '') { return makeBase('text', { x, y, text, fontSize: STATE.fontSize, fontFamily: "'Segoe UI', system-ui, sans-serif" }); }
function makeImage(x, y, w, h, src) { return makeBase('image', { x, y, width: w, height: h, src }); }

// ══════════════════════════════════════════════════════
// 7. BOUNDING BOX & RENDERING
// ══════════════════════════════════════════════════════

function getBounds(el) {
  switch (el.type) {
    case 'rect': case 'circle': case 'image': {
      const x = el.width  >= 0 ? el.x : el.x + el.width;
      const y = el.height >= 0 ? el.y : el.y + el.height;
      return { x, y, width: Math.abs(el.width), height: Math.abs(el.height) };
    }
    case 'line': case 'arrow': {
      return { x: Math.min(el.x1, el.x2), y: Math.min(el.y1, el.y2), width: Math.abs(el.x2 - el.x1), height: Math.abs(el.y2 - el.y1) };
    }
    case 'pencil': {
      if (!el.points.length) return { x: 0, y: 0, width: 0, height: 0 };
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const [px, py] of el.points) {
        if (px < minX) minX = px; if (px > maxX) maxX = px;
        if (py < minY) minY = py; if (py > maxY) maxY = py;
      }
      return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }
    case 'text': {
      ctx.save(); ctx.font = `${el.fontSize}px ${el.fontFamily}`;
      const lines = (el.text || '').split('\n');
      const w = Math.max(...lines.map(l => ctx.measureText(l).width), 40);
      ctx.restore();
      return { x: el.x, y: el.y, width: w, height: (el.fontSize * 1.4) * Math.max(lines.length, 1) };
    }
    default: return { x: 0, y: 0, width: 0, height: 0 };
  }
}

function getRoughCacheKey(el) {
  switch (el.type) {
    case 'rect': case 'circle': return `${el.x},${el.y},${el.width},${el.height},${el.roughness}`;
    case 'line': case 'arrow':  return `${el.x1},${el.y1},${el.x2},${el.y2},${el.roughness}`;
    default: return '';
  }
}

function ensureRough(el) {
  const key = getRoughCacheKey(el);
  if (el._roughKey === key && el._rough) return;
  el._roughKey = key;
  const s = el.seed; const rf = el.roughness;

  if (el.type === 'rect') {
    const b = getBounds(el); el._rough = rf > 0 ? buildRoughRect(b.x, b.y, b.width, b.height, s, rf) : null;
  } else if (el.type === 'circle') {
    const b = getBounds(el); el._rough = rf > 0 ? buildRoughEllipse(b.x + b.width/2, b.y + b.height/2, b.width/2, b.height/2, s, rf) : null;
  } else if (el.type === 'line' || el.type === 'arrow') {
    el._rough = rf > 0 ? buildRoughLine(el.x1, el.y1, el.x2, el.y2, s, rf) : null;
  }
}

function drawElement(el, isCurrentlyDrawing = false) {
  ctx.save();
  ctx.globalAlpha = el.opacity; ctx.strokeStyle = el.strokeColor;
  ctx.fillStyle   = el.fillColor === 'transparent' ? 'rgba(0,0,0,0)' : el.fillColor;
  ctx.lineWidth   = el.strokeWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  switch (el.type) {
    case 'image': {
      const b = getBounds(el);
      if (!el._img) { el._img = new Image(); el._img.src = el.src; el._img.onload = scheduleRender; }
      if (el._img.complete && el._img.naturalWidth) ctx.drawImage(el._img, b.x, b.y, b.width, b.height);
      break;
    }
    case 'rect': {
      const b = getBounds(el);
      if (el.roughness > 0 && !isCurrentlyDrawing) {
        ensureRough(el);
        if (el.fillColor !== 'transparent') { ctx.beginPath(); ctx.rect(b.x, b.y, b.width, b.height); ctx.fill(); }
        replayCmds(ctx, el._rough); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.rect(b.x, b.y, b.width, b.height);
        if (el.fillColor !== 'transparent') ctx.fill();
        ctx.stroke();
      }
      break;
    }
    case 'circle': {
      const b = getBounds(el); const cx = b.x + b.width / 2; const cy = b.y + b.height / 2;
      const rx = b.width / 2; const ry = b.height / 2;
      if (el.roughness > 0 && !isCurrentlyDrawing) {
        ensureRough(el);
        if (el.fillColor !== 'transparent') { ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fill(); }
        replayPts(ctx, el._rough.pts); ctx.stroke(); replayPts(ctx, el._rough.pts2); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        if (el.fillColor !== 'transparent') ctx.fill();
        ctx.stroke();
      }
      break;
    }
    case 'line': {
      if (el.roughness > 0 && !isCurrentlyDrawing) { ensureRough(el); replayCmds(ctx, el._rough); } 
      else { ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); }
      ctx.stroke(); break;
    }
    case 'arrow': {

// ══════════════════════════════════════════════════════
// 9. HIT TESTING & HANDLES
// ══════════════════════════════════════════════════════

function ptInRect(px, py, x, y, w, h, pad = 0) { return px >= x - pad && px <= x + w + pad && py >= y - pad && py <= y + h + pad; }
function distToSegment(px, py, x1, y1, x2, y2) {

function hitTest(el, wx, wy) {

    { name: 'nw', wx: x,       wy: y       }, { name: 'n',  wx: x + w/2, wy: y       },
    { name: 'ne', wx: x + w,   wy: y       }, { name: 'e',  wx: x + w,   wy: y + h/2 },
    { name: 'se', wx: x + w,   wy: y + h   }, { name: 's',  wx: x + w/2, wy: y + h   },

// ══════════════════════════════════════════════════════
// 10. MAIN RENDER LOOP
// ══════════════════════════════════════════════════════

let _rafId = null;

}

function render() {

  ctx.fillRect(0, 0, W, H);

// ══════════════════════════════════════════════════════
// 11. HISTORY SYSTEM
// ══════════════════════════════════════════════════════

function snapshot() {
  return JSON.stringify(STATE.elements.map(el => { const clone = { ...el }; delete clone._rough; delete clone._roughKey; delete clone._img; return clone; }));
}
function pushHistory() {
  STATE.history.splice(STATE.historyIndex + 1); STATE.history.push(snapshot());

// ══════════════════════════════════════════════════════
// 12. PROPORTIONAL RESIZE LOGIC (Feature added)
// ══════════════════════════════════════════════════════

function applyResize(dx, dy, maintainAspect = false) {
  if (!STATE.resizeStart) return;
  const { handle, elSnapshots, selBounds } = STATE.resizeStart;
  const { x: ox, y: oy, width: ow, height: oh } = selBounds;

  let nx = ox, ny = oy, nw = ow, nh = oh;

  // Basic unconstrained calculation
  switch (handle) {
    case 'se': nw = Math.max(4, ow + dx); nh = Math.max(4, oh + dy); break;
    case 'sw': nx = ox + dx; nw = Math.max(4, ow - dx); nh = Math.max(4, oh + dy); break;
    case 'ne': nw = Math.max(4, ow + dx); ny = oy + dy; nh = Math.max(4, oh - dy); break;
    case 'nw': nx = ox + dx; nw = Math.max(4, ow - dx); ny = oy + dy; nh = Math.max(4, oh - dy); break;
    case 'e':  nw = Math.max(4, ow + dx); break;
    case 'w':  nx = ox + dx; nw = Math.max(4, ow - dx); break;
    case 's':  nh = Math.max(4, oh + dy); break;
    case 'n':  ny = oy + dy; nh = Math.max(4, oh - dy); break;
  }

  // Enforce aspect ratio logic if shift is pressed
  if (maintainAspect && ow > 0 && oh > 0) {
    const aspect = ow / oh;
    if (handle === 'e' || handle === 'w') {
      nh = nw / aspect;
      ny = oy + (oh - nh) / 2; // Keep vertically centered
    } else if (handle === 's' || handle === 'n') {
      nw = nh * aspect;
      nx = ox + (ow - nw) / 2; // Keep horizontally centered
    } else {
      // Corner points - scale proportionally by the largest change
      const scale = Math.max(nw / ow, nh / oh);
      nw = ow * scale;
      nh = oh * scale;
    }
    // Readjust offsets for top/left handles when locked
    if (handle.includes('w')) nx = ox + (ow - nw);
    if (handle.includes('n')) ny = oy + (oh - nh);
  }

  const scaleX = nw / ow; const scaleY = nh / oh;

  for (const [id, snap] of elSnapshots) {
    const el = STATE.elements.find(e => e.id === id); if (!el) continue;

    if (el.type === 'rect' || el.type === 'circle' || el.type === 'image') {
      el.x = nx + (snap.x - ox) * scaleX; el.y = ny + (snap.y - oy) * scaleY;
      el.width  = snap.width  * scaleX; el.height = snap.height * scaleY;
      delete el._rough; delete el._roughKey;
    } else if (el.type === 'line' || el.type === 'arrow') {
      el.x1 = nx + (snap.x1 - ox) * scaleX; el.y1 = ny + (snap.y1 - oy) * scaleY;
      el.x2 = nx + (snap.x2 - ox) * scaleX; el.y2 = ny + (snap.y2 - oy) * scaleY;
      delete el._rough; delete el._roughKey;
    } else if (el.type === 'pencil') {
      el.points = snap.points.map(([px, py]) => [nx + (px - ox) * scaleX, ny + (py - oy) * scaleY]);
    } else if (el.type === 'text') {
      el.x = nx + (snap.x - ox) * scaleX; el.y = ny + (snap.y - oy) * scaleY;
    }
  }
}

// ══════════════════════════════════════════════════════
// 13. MOUSE / TOUCH EVENT HANDLERS
// ══════════════════════════════════════════════════════

function onMouseDown(e) {
  if (e.button === 1) { startPan(e); return; }
  if (e.button !== 0 && e.button !== undefined) return;

  commitTextEdit();
  
  // Close mobile panel on interaction
  document.getElementById('props-panel').classList.remove('open');

  const sp = getCanvasPos(e); const wp = screenToWorld(sp.x, sp.y); STATE.mouseWorld = wp;

  if (STATE.spaceDown) { startPan(e); return; }

  const tool = STATE.tool;
  if (tool === 'select') {
    const handle = hitHandle(sp.x, sp.y);
    if (handle && STATE.selectedIds.size > 0) { startResize(handle, wp); return; }
    const hit = findElement(wp.x, wp.y);
    if (hit) {
      if (!e.shiftKey && !STATE.selectedIds.has(hit.id)) STATE.selectedIds.clear();
      STATE.selectedIds.add(hit.id); startMove(wp);
    } else {
      if (!e.shiftKey) STATE.selectedIds.clear();
      startRubberBand(wp);
    }
    scheduleRender(); return;
  }

  if (tool === 'bucket') {
    const hit = findElement(wp.x, wp.y);
    if (hit && hit.type !== 'line' && hit.type !== 'pencil' && hit.type !== 'arrow' && hit.type !== 'image') {
      hit.fillColor = STATE.fillColor; delete hit._rough; delete hit._roughKey;
      pushHistory(); scheduleRender();

  }

  if (tool === 'text') {
    const hit = findElement(wp.x, wp.y);
    if (hit && hit.type === 'text') {
      STATE.selectedIds.clear(); STATE.selectedIds.add(hit.id); beginTextEdit(hit, sp);
    } else {
      const el = makeText(wp.x, wp.y); STATE.elements.push(el); pushHistory();
      STATE.selectedIds.clear(); STATE.selectedIds.add(el.id); beginTextEdit(el, sp);
    }
    scheduleRender(); return;
  }

  STATE.isDrawing = true; STATE.drawStart = { x: wp.x, y: wp.y };

    case 'pencil': STATE.currentEl = makePencil([[wp.x, wp.y]]); break;
    case 'rect':   STATE.currentEl = makeRect(wp.x, wp.y, 0, 0); break;
    case 'circle': STATE.currentEl = makeCircle(wp.x, wp.y, 0, 0); break;
    case 'line':   STATE.currentEl = makeLine(wp.x, wp.y, wp.x, wp.y); break;
    case 'arrow':  STATE.currentEl = makeArrow(wp.x, wp.y, wp.x, wp.y); break;

  }

      if ('x1' in el) { el.x1 = origin.x1 + dx; el.y1 = origin.y1 + dy; el.x2 = origin.x2 + dx; el.y2 = origin.y2 + dy; }

  }

}

function onMouseUp(e) {

  if (STATE.isMoving) { STATE.isMoving = false; STATE.moveStart = null; STATE.moveOrigins = null; pushHistory(); scheduleRender(); return; }

  if (STATE.tool === 'select' && STATE.selectionBox !== null) {
    const sb = STATE.selectionBox;
    if (sb.width > 4 || sb.height > 4) {

  STATE.isResizing = true; STATE.resizeHandle = handle;
  const selBounds = getSelectionBounds(); const elSnapshots = new Map();
  for (const id of STATE.selectedIds) {
    const el = STATE.elements.find(e => e.id === id); if (!el) continue;
    elSnapshots.set(id, JSON.parse(JSON.stringify(el)));
  }
  STATE.resizeStart = { handle, mouseWorld: wp, elSnapshots, selBounds };
}

function startRubberBand(wp) { STATE.selectionBox = { _start: { x: wp.x, y: wp.y }, x: wp.x, y: wp.y, width: 0, height: 0 }; }
function eraseAt(wx, wy) {
  const before = STATE.elements.length; STATE.elements = STATE.elements.filter(el => !hitTest(el, wx, wy));
  if (STATE.elements.length !== before) { scheduleRender(); pushHistory(); }
}

// ══════════════════════════════════════════════════════
// 14. ZOOM & CAMERA UTILS
// ══════════════════════════════════════════════════════

const MIN_ZOOM = 0.05, MAX_ZOOM = 20;

function zoomAt(sx, sy, factor) {
  const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, STATE.camera.zoom * factor));
  const ratio   = newZoom / STATE.camera.zoom;
  STATE.camera.x = sx - ratio * (sx - STATE.camera.x);
  STATE.camera.y = sy - ratio * (sy - STATE.camera.y);
  STATE.camera.zoom = newZoom;
  document.getElementById('btn-zoom-reset').textContent = Math.round(STATE.camera.zoom * 100) + '%';
  scheduleRender();
}
function setZoom(level) { zoomAt(canvas.clientWidth / 2, canvas.clientHeight / 2, level / STATE.camera.zoom); }

// ══════════════════════════════════════════════════════
// 15. CURSOR & STATUS
// ══════════════════════════════════════════════════════

const CURSOR_CLASSES = ['cursor-select','cursor-move','cursor-grab','cursor-grabbing', 'cursor-bucket',
  'cursor-text','cursor-eraser','cursor-nw-resize','cursor-ne-resize','cursor-se-resize',
  'cursor-sw-resize','cursor-n-resize','cursor-s-resize','cursor-e-resize','cursor-w-resize'];

function setCursor(name) {
  canvas.classList.remove(...CURSOR_CLASSES);
  if (name) canvas.classList.add('cursor-' + name);
}

function updateCursorStyle(sx, sy, wx, wy) {
  if (STATE.isPanning)  { setCursor('grabbing'); return; }
  if (STATE.spaceDown)  { setCursor('grab'); return; }
  if (STATE.isMoving)   { setCursor('move'); return; }
  if (STATE.isResizing) { setCursor(HANDLE_CURSORS[STATE.resizeHandle] || ''); return; }

  const tool = STATE.tool;
  if (tool === 'select') {
    const handle = hitHandle(sx, sy);
    if (handle) { setCursor(HANDLE_CURSORS[handle]); return; }
    const hit = findElement(wx, wy); setCursor(hit ? 'move' : 'select');
  } 
  else if (tool === 'text') { setCursor('text'); } 
  else if (tool === 'bucket') { setCursor('bucket'); }
  else if (tool === 'eraser') { setCursor('eraser'); } 
  else { setCursor(null); }
}

function updateStatusPos(wx, wy) { document.getElementById('status-pos').textContent = `X: ${Math.round(wx)}  Y: ${Math.round(wy)}`; }

function updateStatus() {
  document.getElementById('status-elements').textContent = `Elements: ${STATE.elements.length}`;
  document.getElementById('status-tool').textContent = `Tool: ${STATE.tool.charAt(0).toUpperCase() + STATE.tool.slice(1)}`;
  document.getElementById('btn-zoom-reset').textContent = Math.round(STATE.camera.zoom * 100) + '%';
}

// ══════════════════════════════════════════════════════
// 16. TEXT EDITING
// ══════════════════════════════════════════════════════

const textCursor  = () => document.getElementById('text-cursor');
const textInputEl = () => document.getElementById('text-input');

function beginTextEdit(el, screenPos) {
  STATE.editingId = el.id; const tc = textCursor(); const ti = textInputEl();
  tc.style.display = 'block'; tc.style.left = screenPos.x + 'px'; tc.style.top = screenPos.y + 'px';
  ti.style.fontSize = (el.fontSize * STATE.camera.zoom) + 'px';
  ti.style.color = el.strokeColor; ti.style.fontFamily = el.fontFamily; ti.value = el.text || '';
  setTimeout(() => { ti.focus(); ti.select(); }, 10); autoResizeTextarea(ti);
}
function commitTextEdit() {
  if (!STATE.editingId) return;
  const ti = textInputEl(); const el = STATE.elements.find(e => e.id === STATE.editingId);
  if (el) { el.text = ti.value; if (!el.text.trim()) STATE.elements = STATE.elements.filter(e => e.id !== el.id); pushHistory(); }
  textCursor().style.display = 'none'; STATE.editingId = null; scheduleRender();
}
function autoResizeTextarea(ta) {
  ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px';
  ta.style.width  = 'auto'; ta.style.width  = Math.max(ta.scrollWidth, 100) + 'px';
}

// ══════════════════════════════════════════════════════
// 17. CANVAS EVENT BINDING (Added Multi-touch for Mobile)
// ══════════════════════════════════════════════════════

function initCanvasEvents() {
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup',   onMouseUp);
  canvas.addEventListener('mouseleave', e => { if (STATE.isPanning) stopPan(); });
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('dblclick', (e) => {
    const sp = getCanvasPos(e); const wp = screenToWorld(sp.x, sp.y); const hit = findElement(wp.x, wp.y);
    if (hit && hit.type === 'text') { selectTool('text'); STATE.selectedIds.clear(); STATE.selectedIds.add(hit.id); beginTextEdit(hit, sp); scheduleRender(); }
  });

  // Mobile multi-touch states
  let pinchStartDist = null;
  let pinchStartCam = null;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
      // 2 Fingers detected -> Initiate Pan/Zoom
      const t1 = e.touches[0]; const t2 = e.touches[1];
      pinchStartDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      pinchStartCam = { x: STATE.camera.x, y: STATE.camera.y, zoom: STATE.camera.zoom };
      
      const cx = (t1.clientX + t2.clientX) / 2;
      const cy = (t1.clientY + t2.clientY) / 2;
      
      const rect = canvas.getBoundingClientRect();
      STATE.panStart = { sx: cx - rect.left, sy: cy - rect.top, cx: STATE.camera.x, cy: STATE.camera.y };
      STATE.isPanning = true;
    } else if (e.touches.length === 1) {
      onMouseDown({ ...e.touches[0], button: 0, touches: e.touches, shiftKey: false, ctrlKey: false, metaKey: false });
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2 && pinchStartDist) {
      // Handle Pinch & Pan
      const t1 = e.touches[0]; const t2 = e.touches[1];
      const currentDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      const zoomFactor = currentDist / pinchStartDist;

      const rect = canvas.getBoundingClientRect();
      const cx = (t1.clientX + t2.clientX) / 2;
      const cy = (t1.clientY + t2.clientY) / 2;
      const spX = cx - rect.left;
      const spY = cy - rect.top;

      // Pan amount
      const dx = spX - STATE.panStart.sx;
      const dy = spY - STATE.panStart.sy;

      // Zoom + Pan applied cleanly together
      const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, pinchStartCam.zoom * zoomFactor));
      const ratio = newZoom / pinchStartCam.zoom;
      
      STATE.camera.zoom = newZoom;
      STATE.camera.x = spX - ratio * (spX - pinchStartCam.x) + dx;
      STATE.camera.y = spY - ratio * (spY - pinchStartCam.y) + dy;
      
      scheduleRender();
    } else if (e.touches.length === 1) {
      onMouseMove({ ...e.touches[0], touches: e.touches, shiftKey: false });
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (e.touches.length < 2) {
      pinchStartDist = null; pinchStartCam = null; STATE.isPanning = false;
    }
    if (e.touches.length === 0) onMouseUp({ button: 0 });
  }, { passive: false });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
}

// ══════════════════════════════════════════════════════
// 18. UI EVENT BINDING
// ══════════════════════════════════════════════════════

function initUI() {
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => { commitTextEdit(); selectTool(btn.dataset.tool); });
  });

  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (window.confirm("Are you sure you want to clear the entire canvas? This cannot be undone.")) {
      STATE.elements = []; STATE.selectedIds.clear(); STATE.history = []; STATE.historyIndex = -1;
      pushHistory(); scheduleRender();
    }
  });

  // Mobile drawer toggle
  document.getElementById('btn-mobile-panel').addEventListener('click', () => {
    document.getElementById('props-panel').classList.toggle('open');
  });

  document.getElementById('btn-theme').addEventListener('click', () => {
    STATE.darkMode = !STATE.darkMode;
    document.documentElement.setAttribute('data-theme', STATE.darkMode ? 'dark' : 'light');
    document.getElementById('icon-moon').style.display = STATE.darkMode ? 'none' : '';
    document.getElementById('icon-sun').style.display = STATE.darkMode ? '' : 'none';
    if (STATE.strokeColor === '#1a1a2e' && STATE.darkMode) STATE.strokeColor = '#e8eaf6';
    if (STATE.strokeColor === '#e8eaf6' && !STATE.darkMode) STATE.strokeColor = '#1a1a2e';
    scheduleRender(); autoSave();
  });

  document.getElementById('btn-grid' ).addEventListener('click', () => {
    STATE.gridEnabled = !STATE.gridEnabled;
    const btn = document.getElementById('btn-grid');
    btn.style.background = STATE.gridEnabled ? 'rgba(91,108,249,0.12)' : '';
    btn.style.color = STATE.gridEnabled ? 'var(--accent)' : '';
    scheduleRender(); autoSave();
  });

  document.getElementById('btn-save'  ).addEventListener('click', saveJSON);
  document.getElementById('btn-load'  ).addEventListener('click', loadJSON);
  document.getElementById('btn-export').addEventListener('click', exportPNG);
  document.getElementById('file-input').addEventListener('change', onFileLoad);

  document.getElementById('btn-zoom-in').addEventListener('click', () => zoomAt(canvas.clientWidth/2, canvas.clientHeight/2, 1.25));
  document.getElementById('btn-zoom-out').addEventListener('click', () => zoomAt(canvas.clientWidth/2, canvas.clientHeight/2, 0.8));
  document.getElementById('btn-zoom-reset').addEventListener('click', () => setZoom(1));

  document.getElementById('btn-bring-front').addEventListener('click', bringToFront);
  document.getElementById('btn-send-back').addEventListener('click', sendToBack);
  document.getElementById('btn-delete-sel').addEventListener('click', deleteSelected);

  document.querySelectorAll('#stroke-swatches .swatch:not(.custom)').forEach(swatch => {
    swatch.addEventListener('click', () => {
      STATE.strokeColor = swatch.dataset.color; setActiveStrokeSwatch(swatch); applyToSelected('strokeColor', STATE.strokeColor);
    });
  });
  document.getElementById('stroke-color-input').addEventListener('input', e => {
    STATE.strokeColor = e.target.value; setActiveStrokeSwatch(document.getElementById('stroke-custom')); applyToSelected('strokeColor', STATE.strokeColor);
  });

  document.querySelectorAll('#fill-swatches .swatch:not(.custom)').forEach(swatch => {
    swatch.addEventListener('click', () => {
      STATE.fillColor = swatch.dataset.color; setActiveFillSwatch(swatch); applyToSelected('fillColor', STATE.fillColor);
    });
  });
  document.getElementById('fill-color-input').addEventListener('input', e => {
    STATE.fillColor = e.target.value; setActiveFillSwatch(document.getElementById('fill-custom')); applyToSelected('fillColor', STATE.fillColor);
  });

  const swSlider = document.getElementById('stroke-width');
  swSlider.addEventListener('input', () => {
    STATE.strokeWidth = parseInt(swSlider.value, 10); document.getElementById('stroke-width-val').textContent = STATE.strokeWidth; applyToSelected('strokeWidth', STATE.strokeWidth);
  });

  const opSlider = document.getElementById('opacity-input');
  opSlider.addEventListener('input', () => {
    STATE.opacity = parseInt(opSlider.value, 10) / 100; document.getElementById('opacity-val').textContent = opSlider.value; applyToSelected('opacity', STATE.opacity);
  });

  document.querySelectorAll('.seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
      STATE.roughness = parseInt(btn.dataset.roughness, 10); applyToSelected('roughness', STATE.roughness, true);
    });
  });

  const fsSlider = document.getElementById('font-size');
  fsSlider.addEventListener('input', () => {
    STATE.fontSize = parseInt(fsSlider.value, 10); document.getElementById('font-size-val').textContent = STATE.fontSize; applyToSelected('fontSize', STATE.fontSize);
  });

  const ti = textInputEl();
  ti.addEventListener('input', () => {
    autoResizeTextarea(ti);
    if (STATE.editingId) { const el = STATE.elements.find(e => e.id === STATE.editingId); if (el) { el.text = ti.value; scheduleRender(); } }
  });
  ti.addEventListener('blur', () => setTimeout(commitTextEdit, 100));
  ti.addEventListener('keydown', e => { if (e.key === 'Escape') commitTextEdit(); e.stopPropagation(); });
}

function selectTool(tool) {
  STATE.tool = tool; STATE.currentEl = null; STATE.isDrawing = false;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.tool-btn[data-tool="${tool}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('font-section').style.display = tool === 'text' ? 'block' : 'none';
  scheduleRender();
}

function setActiveStrokeSwatch(active) { document.querySelectorAll('#stroke-swatches .swatch').forEach(s => s.classList.remove('active')); active.classList.add('active'); scheduleRender(); }
function setActiveFillSwatch(active) { document.querySelectorAll('#fill-swatches .swatch').forEach(s => s.classList.remove('active')); active.classList.add('active'); scheduleRender(); }

function applyToSelected(prop, value, invalidateRough = false) {
  if (!STATE.selectedIds.size) { scheduleRender(); return; }
  for (const id of STATE.selectedIds) {
    const el = STATE.elements.find(e => e.id === id);
    if (el && prop in el) { el[prop] = value; if (invalidateRough) { delete el._rough; delete el._roughKey; } }
  }
  pushHistory(); scheduleRender();
}

function snapToGrid(v) { return Math.round(v / STATE.gridSize) * STATE.gridSize; }
function snapAngle(x1, y1, x2, y2) {
  const angle = Math.atan2(y2 - y1, x2 - x1); const snap = Math.PI / 4; const snapped = Math.round(angle / snap) * snap;
  const dist = Math.hypot(x2 - x1, y2 - y1); return { x: x1 + dist * Math.cos(snapped), y: y1 + dist * Math.sin(snapped) };
}

// ══════════════════════════════════════════════════════
// 19. STORAGE & FILE I/O
// ══════════════════════════════════════════════════════
const LS_KEY = 'XYRONIX_session';
function autoSave() { try { localStorage.setItem(LS_KEY, JSON.stringify({ elements: STATE.elements.map(el => { const c = { ...el }; delete c._rough; delete c._roughKey; delete c._img; return c; }), camera: STATE.camera, darkMode: STATE.darkMode, gridEnabled: STATE.gridEnabled })); } catch(_) {} }
function autoLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY); if (!raw) return; const data = JSON.parse(raw);
    if (Array.isArray(data.elements)) {
      STATE.elements = data.elements; if (data.camera) STATE.camera = data.camera;
      if (data.darkMode) { STATE.darkMode = true; document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('icon-moon').style.display = 'none'; document.getElementById('icon-sun').style.display = ''; }
      if (data.gridEnabled) { STATE.gridEnabled = true; const btn = document.getElementById('btn-grid'); btn.style.background = 'rgba(91,108,249,0.12)'; btn.style.color = 'var(--accent)'; }
      STATE.history = [snapshot()]; STATE.historyIndex = 0; updateUndoRedoBtns(); scheduleRender();
    }
  } catch(_) {}
}
function saveJSON() {
  const data = { version: '1.0', elements: STATE.elements.map(el => { const c = { ...el }; delete c._rough; delete c._roughKey; delete c._img; return c; }), camera: STATE.camera };
  downloadBlob(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), 'XYRONIX-' + Date.now() + '.json');
}
function loadJSON() { document.getElementById('file-input').click(); }
function onFileLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => { const wp = screenToWorld(canvas.clientWidth / 2, canvas.clientHeight / 2); STATE.elements.push(makeImage(wp.x - img.width / 2, wp.y - img.height / 2, img.width, img.height, ev.target.result)); pushHistory(); scheduleRender(); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = ev => { try { const data = JSON.parse(ev.target.result); if (Array.isArray(data.elements)) { STATE.elements = data.elements; if (data.camera) STATE.camera = data.camera; pushHistory(); scheduleRender(); } } catch(err) { alert('Could not parse file: ' + err.message); } };
    reader.readAsText(file);
  }
  e.target.value = '';
}
function exportPNG() {
  if (!STATE.elements.length) { alert('Nothing to export!'); return; }
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const el of STATE.elements) { const b = getBounds(el); if (b.x < minX) minX = b.x; if (b.y < minY) minY = b.y; if (b.x + b.width > maxX) maxX = b.x + b.width; if (b.y + b.height > maxY) maxY = b.y + b.height; }
  const pad = 40; const W = (maxX - minX) + pad * 2; const H = (maxY - minY) + pad * 2;
  const offscreen = document.createElement('canvas'); offscreen.width = W; offscreen.height = H; const octx = offscreen.getContext('2d');
  octx.fillStyle = STATE.darkMode ? '#13151f' : '#faf8f4'; octx.fillRect(0, 0, W, H); octx.translate(pad - minX, pad - minY);
  const savedCtx = ctx; ctx = octx; for (const el of STATE.elements) drawElement(el, false); ctx = savedCtx;
  offscreen.toBlob(blob => downloadBlob(blob, 'XYRONIX-' + Date.now() + '.png'));
}
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function bringToFront() { if (!STATE.selectedIds.size) return; const ids = [...STATE.selectedIds]; const nonSelected = STATE.elements.filter(e => !ids.includes(e.id)); const selected = STATE.elements.filter(e => ids.includes(e.id)); STATE.elements = [...nonSelected, ...selected]; pushHistory(); scheduleRender(); }
function sendToBack() { if (!STATE.selectedIds.size) return; const ids = [...STATE.selectedIds]; const nonSelected = STATE.elements.filter(e => !ids.includes(e.id)); const selected = STATE.elements.filter(e => ids.includes(e.id)); STATE.elements = [...selected, ...nonSelected]; pushHistory(); scheduleRender(); }
function deleteSelected() { if (!STATE.selectedIds.size) return; STATE.elements = STATE.elements.filter(e => !STATE.selectedIds.has(e.id)); STATE.selectedIds.clear(); pushHistory(); scheduleRender(); }

// ══════════════════════════════════════════════════════
// 20. KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════

function initKeyboard() {
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName.toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && e.key === 'z') { e.preventDefault(); undo(); return; }
    if (ctrl && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); return; }
    if (ctrl && e.key === 's') { e.preventDefault(); saveJSON(); return; }
    if (ctrl && e.key === 'e') { e.preventDefault(); exportPNG(); return; }
    if (ctrl && e.key === 'a') { e.preventDefault(); STATE.selectedIds = new Set(STATE.elements.map(e => e.id)); scheduleRender(); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') { deleteSelected(); return; }
    if (e.key === ' ') { e.preventDefault(); STATE.spaceDown = true; setCursor('grab'); return; }
    if (e.key === 'Escape') { commitTextEdit(); STATE.selectedIds.clear(); STATE.currentEl = null; STATE.isDrawing = false; scheduleRender(); return; }

    const toolKeys = { v: 'select', p: 'pencil', r: 'rect', c: 'circle', l: 'line', a: 'arrow', t: 'text', e: 'eraser', f: 'bucket' };
    if (!ctrl && toolKeys[e.key.toLowerCase()]) selectTool(toolKeys[e.key.toLowerCase()]);

    if (e.key === '+' || e.key === '=') zoomAt(canvas.clientWidth/2, canvas.clientHeight/2, 1.25);
    if (e.key === '-') zoomAt(canvas.clientWidth/2, canvas.clientHeight/2, 0.8);
    if (e.key === '0') setZoom(1);

    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      if (!STATE.selectedIds.size) return;
      const amount = e.shiftKey ? 10 : 1; const dx = e.key === 'ArrowLeft' ? -amount : e.key === 'ArrowRight' ? amount : 0; const dy = e.key === 'ArrowUp' ? -amount : e.key === 'ArrowDown' ? amount : 0;
      for (const id of STATE.selectedIds) {
        const el = STATE.elements.find(e => e.id === id); if (!el) continue;
        if ('x' in el) { el.x += dx; el.y += dy; }
        if ('x1' in el) { el.x1 += dx; el.y1 += dy; el.x2 += dx; el.y2 += dy; }
        if (el.type === 'pencil') el.points = el.points.map(([px,py]) => [px+dx, py+dy]);
        delete el._rough; delete el._roughKey;
      }
      pushHistory(); scheduleRender(); e.preventDefault();
    }
  });
  document.addEventListener('keyup', e => { if (e.key === ' ') { STATE.spaceDown = false; setCursor(null); } });
}

// ══════════════════════════════════════════════════════
// 21. INITIALIZATION
// ══════════════════════════════════════════════════════

function init() {
  initCanvas(); initUI(); initKeyboard(); initCanvasEvents();
  STATE.history = [snapshot()]; STATE.historyIndex = 0; updateUndoRedoBtns(); autoLoad(); scheduleRender();
}

document.addEventListener('DOMContentLoaded', init);
